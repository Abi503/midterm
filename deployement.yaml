apiVersion: apps/v1
kind: Deployment
metadata:
  name: midterm

spec:
  replicas: 2
  selector:
    matchLabels:
      app: midterm

  template:
    metadata:
      labels:
        app: midterm

    spec:
      containers:
      - name: midterm
        image: 23mis0239/midterm:latest
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: midterm-service

spec:
  type: NodePort
  selector:
    app: midterm

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30010
